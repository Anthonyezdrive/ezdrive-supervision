# ============================================
# EZDrive OCPP Server - Fly.io Configuration
# ============================================

app = "ezdrive-ocpp"
primary_region = "cdg"  # Paris, France

[build]

[env]
  PORT = "9000"
  LOG_LEVEL = "info"
  NODE_ENV = "production"

[http_service]
  internal_port = 9000
  force_https = true
  auto_stop_machines = false    # CRITICAL: Keep alive for WebSocket connections
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 2500
    soft_limit = 2000

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 9000
    path = "/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
